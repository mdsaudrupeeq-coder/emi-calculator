<!DOCTYPE html>
<html>
<head>
<title>RUPEEROOT - Smart Eligibility</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="logo.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI';
}

body{
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px 20px;
}

.logo{
  width:45px;
  border-radius:12px;
  background:rgba(255,255,255,0.1);
  padding:5px;
}

.brand{
  font-size:18px;
  font-weight:bold;
  color:#00e5ff;
}

.sub{
  font-size:11px;
  color:#80d8ff;
}

/* CARD */
.container{
  padding:20px;
}

.card{
  background:rgba(0,0,0,0.6);
  border-radius:20px;
  padding:20px;
  backdrop-filter: blur(20px);
  box-shadow:0 0 25px rgba(0,229,255,0.2);
}

input,select{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-bottom:12px;
  background:#111;
  color:white;
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  font-size:15px;
  cursor:pointer;
  background:linear-gradient(90deg,#00e5ff,#00ffa3);
  color:black;
}

/* RESULT */
.result{
  margin-top:20px;
}

.box{
  background:rgba(0,0,0,0.6);
  padding:15px;
  border-radius:15px;
  margin-bottom:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.highlight{
  font-size:20px;
  color:#00ffa3;
  font-weight:bold;
}

.good{color:#00ffa3;}
.mid{color:orange;}
.bad{color:red;}

.apply{
  margin-top:10px;
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div>
    <div class="brand">RUPEEROOT</div>
    <div class="sub">Smart Loan Engine</div>
  </div>
</div>

<div class="container">
<div class="card">

<input type="number" id="salary" placeholder="💰 Monthly Salary">
<input type="number" id="emi" placeholder="💳 Existing EMI" value="0">
<input type="number" id="cc" placeholder="💳 Credit Card Outstanding" value="0">

<select id="hl">
<option value="no">🏠 No Home Loan</option>
<option value="yes">🏠 Home Loan Active</option>
</select>

<select id="house">
<option value="rented">🏢 Rented</option>
<option value="owned">🏡 Owned</option>
</select>

<select id="bank">
<option value="bajaj">Bajaj</option>
<option value="tata">Tata</option>
<option value="kotak">Kotak</option>
<option value="abfl">ABFL</option>
<option value="idfc">IDFC</option>
<option value="hdfc">HDFC</option>
<option value="icici">ICICI</option>
</select>

<button onclick="calculate()">Check Smart Eligibility</button>

<div class="result" id="resultBox"></div>

</div>
</div>

<script>
function calculate(){

let salary = +salary.value || 0;
let emi = +document.getElementById("emi").value || 0;
let cc = +document.getElementById("cc").value || 0;
let hl = document.getElementById("hl").value;
let house = document.getElementById("house").value;
let bank = document.getElementById("bank").value;

let foir = 0;

/* FOIR */
if(bank==="kotak"){
  foir = (hl==="yes" && house==="owned") ? 65 : 60;
}else{
  if(salary>=50000 && salary<60000) foir=60;
  else if(salary>=60000 && salary<70000) foir=65;
  else if(salary>=70000 && salary<100000) foir=70;
  else if(salary>=100000) foir=75;

  if(hl==="yes" && house==="owned") foir+=5;
}

/* EMI */
let eligibleEMI = (salary*foir/100) - emi - (cc*0.05);

/* EMI Loan */
let r=0.14/12, n=60;
let emiLoan = (eligibleEMI*(Math.pow(1+r,n)-1))/(r*Math.pow(1+r,n));

/* Multiplier */
let multMap={
bajaj:20,tata:18,kotak:22,abfl:20,idfc:18,hdfc:24,icici:22
};

let multiplierLoan = salary*(multMap[bank]||20);

/* Approval % */
let score = (foir*0.8) - (emi/1000);
let status="bad", text="Low ❌";

if(score>60){status="good"; text="High 🔥";}
else if(score>40){status="mid"; text="Medium ⚠️";}

if(eligibleEMI<=0){
resultBox.innerHTML=`<div class="box bad">❌ Not Eligible</div>`;
return;
}

/* Best Bank */
let best="HDFC";
if(foir<60) best="Tata / Bajaj";
if(hl==="yes") best="Kotak";

/* UI OUTPUT */
resultBox.innerHTML=`
<div class="box">
FOIR: <b>${foir}%</b>
</div>

<div class="box">
Eligible EMI: ₹ ${Math.round(eligibleEMI)}
</div>

<div class="box">
EMI Based Loan<br>
<span class="highlight">₹ ${Math.round(emiLoan).toLocaleString()}</span>
</div>

<div class="box">
Multiplier Loan<br>
<span class="highlight">₹ ${multiplierLoan.toLocaleString()}</span>
</div>

<div class="box">
Best Bank: <b>${best}</b>
</div>

<div class="box ${status}">
Approval Chance: ${text}
</div>

<button class="apply" onclick="window.location.href='https://wa.me/918750370822'">
Apply on WhatsApp
</button>
`;
}
</script>

</body>
</html>
