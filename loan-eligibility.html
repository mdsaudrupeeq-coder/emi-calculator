<!DOCTYPE html>
<html>
<head>
<title>RupeeRoot Loan Eligibility</title>

<!-- SAME FAVICON -->
<link rel="icon" type="image/png" href="logo.png">

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  background:#f4f7fb;
}

.header{
  background:#2563eb;
  padding:15px 30px;
  display:flex;
  align-items:center;
}

.logo{
  width:50px;
  height:50px;
  object-fit:contain;
  margin-right:12px;
}

.brand{
  font-size:20px;
  font-weight:600;
  color:white;
}

.sub{
  font-size:12px;
  color:#e0e7ff;
}

.container{
  width:600px;
  margin:30px auto;
}

.card{
  background:white;
  padding:25px;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

label{
  display:block;
  margin-top:15px;
  font-weight:500;
}

input, select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border:1px solid #d1d5db;
  border-radius:6px;
}

.result{
  margin-top:20px;
  background:#f9fafb;
  padding:15px;
  border-radius:8px;
  border:1px solid #e5e7eb;
}

.big{
  font-size:18px;
  font-weight:600;
}

button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div>
    <div class="brand">RUPEEROOT</div>
    <div class="sub">Your Trusted Loan Partner</div>
  </div>
</div>

<div class="container">
<div class="card">

<label>Customer Salary</label>
<input type="number" id="salary">

<label>Total Existing EMI</label>
<input type="number" id="emi" value="0">

<label>CC Outstanding</label>
<input type="number" id="cc" value="0">

<label>HL Live</label>
<select id="hl">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<label>House Type</label>
<select id="house">
<option value="rented">Rented</option>
<option value="owned">Owned</option>
</select>

<label>Bank</label>
<select id="bank">
<option value="bajaj">Bajaj</option>
<option value="tata">Tata</option>
<option value="kotak">Kotak</option>
<option value="abfl">ABFL</option>
<option value="idfc">IDFC</option>
<option value="hdfc">HDFC</option>
<option value="icici">ICICI</option>
</select>

<button onclick="calculate()">Check Eligibility</button>

<div class="result" id="resultBox"></div>

</div>
</div>

<script>
function calculate(){

let salary = parseFloat(document.getElementById("salary").value) || 0;
let emi = parseFloat(document.getElementById("emi").value) || 0;
let cc = parseFloat(document.getElementById("cc").value) || 0;
let hl = document.getElementById("hl").value;
let house = document.getElementById("house").value;
let bank = document.getElementById("bank").value;

let foir = 0;

// FOIR LOGIC
if(bank === "kotak"){
    if(hl === "yes" && house === "owned"){
        foir = 65;
    } else {
        foir = 60;
    }
} else {

    if(salary >= 50000 && salary < 60000){
        foir = 60;
    } else if(salary >= 60000 && salary < 70000){
        foir = 65;
    } else if(salary >= 70000 && salary < 100000){
        foir = 70;
    } else if(salary >= 100000){
        foir = 75;
    }

    if(hl === "yes" && house === "owned"){
        foir += 5;
    }
}

// ELIGIBLE EMI
let eligibleEMI = (salary * foir / 100) - emi - (cc * 0.05);

if(eligibleEMI < 0){
    document.getElementById("resultBox").innerHTML =
    "<h3>Not Eligible</h3>";
    return;
}

// LOAN CALC (Assume 5 years, 14%)
let rate = 0.14/12;
let n = 60;

let loan = (eligibleEMI * (Math.pow(1+rate,n)-1)) / (rate*Math.pow(1+rate,n));
loan = Math.round(loan);

document.getElementById("resultBox").innerHTML =
"<p>FOIR: " + foir + "%</p>" +
"<p>Eligible EMI: ₹ " + Math.round(eligibleEMI) + "</p>" +
"<div class='big'>Eligible Loan: ₹ " + loan.toLocaleString() + "</div>";
}
</script>

</body>
</html>
