<!DOCTYPE html>
<html>
<head>
<title>RUPEEROOT - Smart Eligibility</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="logo.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI';
}

body{
  background:#f4f7fb;
  color:black;
}

.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:15px 20px;
  background:#2563eb;
}

.logo{
  width:45px;
}

.brand{
  font-size:18px;
  font-weight:bold;
  color:white;
}

.sub{
  font-size:11px;
  color:#e0e7ff;
}

.container{
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.1);
}

input,select{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #d1d5db;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:linear-gradient(90deg,#00e5ff,#00ffa3);
}

.result{
  margin-top:20px;
}

.box{
  background:#f9fafb;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  border:1px solid #e5e7eb;
}

.highlight{
  font-size:20px;
  color:#16a34a;
  font-weight:bold;
}

.apply{
  margin-top:10px;
  background:#25D366;
  color:white;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div>
    <div class="brand">RUPEEROOT</div>
    <div class="sub">Smart Loan Engine</div>
  </div>
</div>

<div class="container">
<div class="card">

<input type="number" id="salary" placeholder="💰 Monthly Salary">
<input type="number" id="emi" placeholder="💳 Existing EMI">
<input type="number" id="cc" placeholder="💳 Credit Card Outstanding">

<!-- 🔥 BT TOGGLE -->
<label><input type="checkbox" id="btToggle" onchange="toggleBT()"> Balance Transfer Case</label>

<!-- 🔥 BT FIELD -->
<div id="btField" style="display:none;">
<input type="number" id="btLoan" placeholder="🔁 BT Outstanding Loan">
</div>

<select id="hl">
<option value="no">🏠 No Home Loan</option>
<option value="yes">🏠 Home Loan Active</option>
</select>

<select id="house">
<option value="rented">🏢 Rented</option>
<option value="owned">🏡 Owned</option>
</select>

<select id="bank">
<option value="bajaj">Bajaj</option>
<option value="tata">Tata</option>
<option value="kotak">Kotak</option>
<option value="abfl">ABFL</option>
<option value="idfc">IDFC</option>
<option value="hdfc">HDFC</option>
<option value="icici">ICICI</option>
</select>

<button onclick="calculate()">Check Smart Eligibility</button>

<div class="result" id="resultBox"></div>

</div>
</div>

<script>

function toggleBT(){
let toggle = document.getElementById("btToggle").checked;
document.getElementById("btField").style.display = toggle ? "block" : "none";
}

function calculate(){

let salary = parseFloat(document.getElementById("salary").value) || 0;
let emi = parseFloat(document.getElementById("emi").value) || 0;
let cc = parseFloat(document.getElementById("cc").value) || 0;
let bt = parseFloat(document.getElementById("btLoan").value) || 0;

let hl = document.getElementById("hl").value;
let house = document.getElementById("house").value;
let bank = document.getElementById("bank").value;

let foir = 0;

/* FOIR */
if(bank==="kotak"){
  foir = (hl==="yes" && house==="owned") ? 65 : 60;
}else{
  if(salary>=50000 && salary<60000) foir=60;
  else if(salary>=60000 && salary<70000) foir=65;
  else if(salary>=70000 && salary<100000) foir=70;
  else if(salary>=100000) foir=75;

  if(hl==="yes" && house==="owned") foir+=5;
}

if(foir>75) foir=75;

/* 🔥 EMI CALC (BT include) */
let eligibleEMI = (salary*foir/100) - emi - (cc*0.05) - (bt*0.03);

/* EMI Loan */
let r=0.14/12, n=60;
let emiLoan = (eligibleEMI*(Math.pow(1+r,n)-1))/(r*Math.pow(1+r,n));

/* MULTIPLIER */
let multMap={
bajaj:20,tata:18,kotak:22,abfl:20,idfc:18,hdfc:24,icici:22
};

let multiplierLoan = salary*(multMap[bank]||20);

/* CAPPING */
if(bank==="bajaj" || bank==="tata" || bank==="abfl"){
  if(emiLoan > 5000000) emiLoan = 5000000;
  if(multiplierLoan > 5000000) multiplierLoan = 5000000;
}

if(eligibleEMI<=0){
resultBox.innerHTML=`<div class="box">❌ Not Eligible</div>`;
return;
}

resultBox.innerHTML=`
<div class="box"><b>FOIR:</b> ${foir}%</div>

<div class="box"><b>Eligible EMI:</b> ₹ ${Math.round(eligibleEMI)}</div>

<div class="box">
EMI Based Loan<br>
<span class="highlight">₹ ${Math.round(emiLoan).toLocaleString()}</span>
</div>

<div class="box">
Multiplier Loan<br>
<span class="highlight">₹ ${Math.round(multiplierLoan).toLocaleString()}</span>
</div>

<button class="apply" onclick="window.location.href='https://wa.me/918750370822'">
Apply on WhatsApp
</button>
`;
}
</script>

</body>
</html>
