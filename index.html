<!DOCTYPE html>
<html>
<head>
    <title>RUPEEROOT - EMI Calculator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
        }

        .header {
            text-align: center;
            padding: 20px;
            font-size: 22px;
            font-weight: bold;
            background: rgba(0,0,0,0.4);
        }

        .container {
            padding: 20px;
        }

        .card {
            background: rgba(0,0,0,0.6);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            background: #111;
            color: white;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            background: linear-gradient(90deg, #00e5ff, #00ffa3);
            color: black;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(0,0,0,0.5);
            display: none;
        }

        .link-btn {
            margin-top: 10px;
            background: linear-gradient(90deg, #00ffa3, #00e5ff);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="header">
    RUPEEROOT - EMI Calculator
</div>

<div class="container">
    <div class="card">

        <input type="number" id="amount" placeholder="Loan Amount (₹)">
        <input type="number" id="rate" placeholder="Interest Rate (%)">
        <input type="number" id="months" placeholder="Loan Tenure (Months)">

        <button onclick="calculateEMI()">Calculate EMI</button>

        <div class="result" id="resultBox"></div>

        <!-- 🔥 Eligibility Button -->
        <a href="loan-eligibility.html">
            <button class="link-btn">Check Loan Eligibility</button>
        </a>

    </div>
</div>

<div class="footer">
    © RUPEEROOT Finance | Smart Loan Tools
</div>

<script>
function calculateEMI() {
    let P = document.getElementById("amount").value;
    let r = document.getElementById("rate").value / 12 / 100;
    let n = document.getElementById("months").value;

    if(P == "" || r == "" || n == "") {
        alert("Please fill all fields");
        return;
    }

    let emi = (P * r * Math.pow(1+r, n)) / (Math.pow(1+r, n) - 1);
    emi = Math.round(emi);

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("resultBox").innerHTML =
    "<h3>Your EMI: ₹ " + emi.toLocaleString() + "</h3>";
}
</script>

</body>
</html>
