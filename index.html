<!DOCTYPE html>
<html>
<head>
<title>Professional EMI Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family: Arial;
  background:#f5f7fb;
  margin:0;
}

.container{
  width:1100px;
  margin:30px auto;
  display:flex;
  gap:20px;
}

.left{
  width:70%;
  background:white;
  padding:20px;
  border-radius:10px;
}

.right{
  width:30%;
  background:white;
  padding:20px;
  border-radius:10px;
}

.tabs button{
  padding:10px 15px;
  border:none;
  background:#e5e7eb;
  margin-right:5px;
  cursor:pointer;
}

.input-box{
  margin:20px 0;
}

label{
  display:block;
  margin-bottom:5px;
}

input[type="number"]{
  width:200px;
  padding:8px;
}

input[type="range"]{
  width:100%;
}

.result{
  display:flex;
  justify-content:space-between;
  margin-top:20px;
}

.card{
  width:48%;
  background:#f1f5f9;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.big{
  font-size:28px;
  color:#0f172a;
}

table{
  width:100%;
  margin-top:20px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="container">

<div class="left">

<div class="tabs">
<button>Home Loan</button>
<button>Personal Loan</button>
<button>Car Loan</button>
</div>

<div class="input-box">
<label>Loan Amount</label>
<input type="number" id="amount" value="5000000">
<input type="range" min="100000" max="20000000" value="5000000" id="amountRange">
</div>

<div class="input-box">
<label>Interest Rate (%)</label>
<input type="number" id="rate" value="9">
<input type="range" min="5" max="20" value="9" id="rateRange">
</div>

<div class="input-box">
<label>Loan Tenure (Years)</label>
<input type="number" id="tenure" value="20">
<input type="range" min="1" max="30" value="20" id="tenureRange">
</div>

<div class="result">

<div class="card">
<p>Loan EMI</p>
<div class="big" id="emi"></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

</div>

<table id="table"></table>

</div>

<div class="right">
<h3>Featured Calculators</h3>
<p>Loan EMI Calculator</p>
<p>Home Loan EMI Calculator</p>
<p>Credit Card EMI</p>
</div>

</div>

<script>

let chart;

function calc(){

let P = amount.value;
let R = rate.value/12/100;
let N = tenure.value*12;

let EMI = (P*R*Math.pow(1+R,N))/(Math.pow(1+R,N)-1);
let total = EMI*N;
let interest = total-P;

emi.innerHTML = "₹ "+EMI.toFixed(0);

// chart
if(chart) chart.destroy();

chart = new Chart(document.getElementById("chart"),{
type:"pie",
data:{
labels:["Principal","Interest"],
datasets:[{
data:[P,interest],
backgroundColor:["#3b82f6","#60a5fa"]
}]
}
});

// table
let html="";
let balance=P;

for(let i=1;i<=N;i++){
let interestPart=balance*R;
let principalPart=EMI-interestPart;
balance-=principalPart;

html+=`<tr>
<td>${i}</td>
<td>${EMI.toFixed(0)}</td>
<td>${principalPart.toFixed(0)}</td>
<td>${interestPart.toFixed(0)}</td>
</tr>`;
}

table.innerHTML=html;

}

// sync inputs
amountRange.oninput=()=>{amount.value=amountRange.value;calc();}
rateRange.oninput=()=>{rate.value=rateRange.value;calc();}
tenureRange.oninput=()=>{tenure.value=tenureRange.value;calc();}

amount.oninput=calc;
rate.oninput=calc;
tenure.oninput=calc;

calc();

</script>

</body>
</html>
